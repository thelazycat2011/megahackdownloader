<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A tool to download MegaHack without the installer">
    <title>MegaHackDownloader</title>
    <style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
}

table {
    margin: auto;
    border-collapse: collapse;
    width: 80%;
    background: #1e1e1e;
}

th, td {
    border: 1px solid #444;
    padding: 8px;
}

th {
    background: #333;
}

a {
    color: #4da6ff;
}
</style>
</head>
<body>
<h1>MegaHackDownloader</h1>
<h3>Note : this tool is only for downloading MegaHack without an installer. You still need to purchase the mod in order to use it.</h3>
<table id="downloadlist">
<tr>
<th>Version</th>
<th>Game version</th>
<th>Download Link</th>
</tr>
</table>
<script>
document.addEventListener("DOMContentLoaded", async () => {
    const req = await fetch("https://megahack.thelazycat.dpdns.org/");
    const data = await req.json();
    const table = document.getElementById("downloadlist");
    table.border = 1;

    for (const [id, pack] of Object.entries(data.packages)) {
        for (const [id2, item] of Object.entries(pack.bundles)) {
            const row = document.createElement("tr");
            const version = document.createElement("td");
            const gjver = document.createElement("td");
            const downloadlink = document.createElement("td");
            version.textContent = item.name;
            gjver.textContent = item.gjver;
            downloadlink.innerHTML = `<a href="https://absolllute.com/api/mega_hack/v9/files/${item.group}/${item.file}">Download here</a>`

            row.appendChild(version);
            row.appendChild(gjver);
            row.appendChild(downloadlink);
            table.appendChild(row);
        }
    }

    document.body.append(table);
});
</script>
</body>
</html>
